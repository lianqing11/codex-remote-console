<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Browser approval flow</title>
  <desc id="desc">A diagram showing how Codex approval requests appear in the browser before remote commands continue.</desc>
  <rect width="1200" height="360" rx="24" fill="#f7faf8"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1e7d62"/>
    </marker>
  </defs>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="58" y="58" font-size="28" font-weight="800" fill="#13211c">Command approvals stay in the browser</text>
    <text x="58" y="92" font-size="18" fill="#65736d">Read-only operations can move quickly; risky commands still require an explicit user decision.</text>
    <rect x="70" y="136" width="245" height="132" rx="16" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="104" y="184" font-size="22" font-weight="800" fill="#13211c">Codex proposes</text>
    <text x="104" y="218" font-size="16" fill="#65736d">Run a command on the remote host</text>
    <rect x="382" y="136" width="245" height="132" rx="16" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="416" y="184" font-size="22" font-weight="800" fill="#13211c">Policy checks</text>
    <text x="416" y="218" font-size="16" fill="#65736d">Auto-approve safe reads</text>
    <rect x="694" y="136" width="245" height="132" rx="16" fill="#eaf4ef" stroke="#a9cabf"/>
    <text x="728" y="184" font-size="22" font-weight="800" fill="#13211c">Browser prompt</text>
    <text x="728" y="218" font-size="16" fill="#466158">Approve, deny, or answer</text>
    <rect x="1006" y="136" width="124" height="132" rx="16" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="1032" y="184" font-size="22" font-weight="800" fill="#13211c">Run</text>
    <text x="1032" y="218" font-size="16" fill="#65736d">Remote</text>
    <text x="1032" y="242" font-size="16" fill="#65736d">command</text>
    <line x1="315" y1="202" x2="382" y2="202" stroke="#1e7d62" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="627" y1="202" x2="694" y2="202" stroke="#1e7d62" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="939" y1="202" x2="1006" y2="202" stroke="#1e7d62" stroke-width="4" marker-end="url(#arrow)"/>
  </g>
</svg>
