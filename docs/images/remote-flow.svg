<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Remote Codex control flow</title>
  <desc id="desc">A diagram showing a laptop browser controlling a remote Codex console, which forwards requests to codex app-server and the remote project filesystem.</desc>
  <rect width="1200" height="420" rx="24" fill="#f5f7f5"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1e7d62"/>
    </marker>
  </defs>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="54" y="84" width="230" height="164" rx="18" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="92" y="132" font-size="24" font-weight="800" fill="#13211c">Laptop browser</text>
    <text x="92" y="168" font-size="17" fill="#65736d">Send prompts</text>
    <text x="92" y="196" font-size="17" fill="#65736d">Approve commands</text>
    <text x="92" y="224" font-size="17" fill="#65736d">Review output and diffs</text>
    <rect x="414" y="64" width="306" height="204" rx="18" fill="#eaf4ef" stroke="#a9cabf"/>
    <text x="462" y="118" font-size="24" font-weight="800" fill="#13211c">Remote console</text>
    <text x="462" y="154" font-size="17" fill="#466158">Next.js UI</text>
    <text x="462" y="182" font-size="17" fill="#466158">Node HTTP + WebSocket bridge</text>
    <text x="462" y="210" font-size="17" fill="#466158">Session and approval routing</text>
    <rect x="850" y="46" width="274" height="126" rx="18" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="898" y="96" font-size="24" font-weight="800" fill="#13211c">codex app-server</text>
    <text x="898" y="132" font-size="17" fill="#65736d">Runs on the remote host</text>
    <rect x="850" y="226" width="274" height="126" rx="18" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="898" y="276" font-size="24" font-weight="800" fill="#13211c">Remote projects</text>
    <text x="898" y="312" font-size="17" fill="#65736d">Code, services, tools, credentials</text>
    <line x1="284" y1="166" x2="414" y2="166" stroke="#1e7d62" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="720" y1="140" x2="850" y2="108" stroke="#1e7d62" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="720" y1="202" x2="850" y2="286" stroke="#1e7d62" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="316" y="146" font-size="15" fill="#1e7d62">HTTPS / VPN / SSH tunnel</text>
    <text x="742" y="96" font-size="15" fill="#1e7d62">JSON-RPC</text>
    <text x="742" y="260" font-size="15" fill="#1e7d62">filesystem</text>
  </g>
</svg>
