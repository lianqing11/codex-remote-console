<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">Codex Remote Console overview</title>
  <desc id="desc">A sanitized product screenshot showing the browser console controlling a Codex session running on a remote machine.</desc>
  <rect width="1440" height="810" fill="#f5f7f5"/>
  <rect x="18" y="18" width="1404" height="774" rx="18" fill="#ffffff" stroke="#d9e0db"/>
  <rect x="18" y="18" width="255" height="774" rx="18" fill="#edf4f0"/>
  <rect x="1146" y="18" width="276" height="774" rx="18" fill="#eef5f1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="48" y="62" font-size="28" font-weight="800" fill="#13211c">Codex Remote</text>
    <text x="48" y="96" font-size="28" font-weight="800" fill="#13211c">Console</text>
    <text x="48" y="126" font-size="15" fill="#65736d">codex-cli 0.130.0</text>
    <rect x="38" y="160" width="210" height="202" rx="10" fill="#ffffff" stroke="#d0d9d3"/>
    <text x="58" y="190" font-size="15" fill="#65736d">Remote directory</text>
    <rect x="58" y="208" width="158" height="46" rx="8" fill="#fafcfb" stroke="#cfd8d2"/>
    <text x="74" y="238" font-size="18" fill="#13211c">/srv/app</text>
    <rect x="58" y="274" width="128" height="38" rx="8" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="78" y="299" font-size="15" fill="#5f6f68">Check path</text>
    <rect x="58" y="326" width="164" height="44" rx="8" fill="#1e7d62"/>
    <text x="86" y="354" font-size="17" fill="#ffffff">New session</text>
    <text x="48" y="418" font-size="22" font-weight="800" fill="#13211c">Sessions</text>
    <rect x="38" y="442" width="96" height="38" rx="8" fill="#e5f4ee" stroke="#1e7d62"/>
    <text x="62" y="467" font-size="15" fill="#176d55">Recent</text>
    <rect x="146" y="442" width="90" height="38" rx="8" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="166" y="467" font-size="15" fill="#65736d">Pinned</text>
    <rect x="38" y="502" width="210" height="82" rx="10" fill="#ffffff" stroke="#cfd8d2"/>
    <circle cx="58" cy="526" r="4" fill="#82a2bd"/>
    <text x="74" y="532" font-size="16" font-weight="700" fill="#1c2b25">Add auth middleware</text>
    <text x="74" y="560" font-size="14" fill="#65736d">2 minutes ago</text>
    <text x="74" y="578" font-size="13" fill="#87938e">loaded</text>
    <rect x="38" y="596" width="210" height="82" rx="10" fill="#ffffff" stroke="#cfd8d2"/>
    <circle cx="58" cy="620" r="4" fill="#82a2bd"/>
    <text x="74" y="626" font-size="16" font-weight="700" fill="#1c2b25">Review API diff</text>
    <text x="74" y="654" font-size="14" fill="#65736d">12 minutes ago</text>
    <text x="74" y="672" font-size="13" fill="#87938e">archived</text>
    <rect x="273" y="18" width="873" height="86" fill="#ffffff"/>
    <text x="294" y="54" font-size="22" font-weight="800" fill="#13211c">Remote session: Add auth middleware</text>
    <text x="294" y="80" font-size="16" fill="#65736d">/srv/app</text>
    <rect x="828" y="34" width="92" height="36" rx="18" fill="#e4f4ef"/>
    <text x="862" y="57" font-size="15" fill="#176d55">online</text>
    <rect x="934" y="28" width="78" height="48" rx="10" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="958" y="58" font-size="18" fill="#1c2b25">Agent</text>
    <rect x="1020" y="28" width="72" height="48" rx="10" fill="#eef2f0"/>
    <text x="1046" y="58" font-size="18" fill="#1c2b25">Plan</text>
    <line x1="273" y1="104" x2="1146" y2="104" stroke="#d9e0db"/>
    <rect x="314" y="136" width="748" height="94" rx="12" fill="#f8faf9" stroke="#d9e0db"/>
    <text x="342" y="170" font-size="16" font-weight="700" fill="#1c2b25">You</text>
    <text x="342" y="204" font-size="19" fill="#25332d">Add a password-protected login route and show the diff after the change.</text>
    <rect x="314" y="258" width="748" height="172" rx="12" fill="#ffffff" stroke="#d9e0db"/>
    <text x="342" y="292" font-size="16" font-weight="700" fill="#1e7d62">Codex</text>
    <text x="342" y="326" font-size="18" fill="#25332d">I will inspect the auth helpers, update the login flow, then run typecheck and tests.</text>
    <rect x="342" y="350" width="670" height="52" rx="8" fill="#17231e"/>
    <text x="364" y="382" font-size="16" fill="#d8efe5" font-family="'SFMono-Regular', Consolas, monospace">$ npm run typecheck</text>
    <rect x="314" y="458" width="748" height="92" rx="12" fill="#f6fbf9" stroke="#bfd8cf"/>
    <text x="342" y="492" font-size="16" font-weight="700" fill="#1e7d62">Code changes in this turn</text>
    <text x="342" y="524" font-size="18" fill="#25332d">3 files changed, 42 additions, 9 deletions</text>
    <rect x="294" y="640" width="812" height="86" rx="10" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="322" y="691" font-size="18" fill="#7b8580">Send a task to Codex running on the remote machine...</text>
    <rect x="1008" y="744" width="96" height="42" rx="9" fill="#1e7d62"/>
    <text x="1035" y="771" font-size="18" fill="#ffffff">Send</text>
    <rect x="1166" y="42" width="230" height="116" rx="10" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="1190" y="78" font-size="20" font-weight="800" fill="#13211c">Active requests</text>
    <text x="1190" y="116" font-size="15" fill="#65736d">No pending approval or question.</text>
    <rect x="1166" y="188" width="230" height="212" rx="10" fill="#ffffff" stroke="#cfd8d2"/>
    <text x="1190" y="224" font-size="20" font-weight="800" fill="#13211c">Runtime</text>
    <text x="1190" y="262" font-size="15" fill="#65736d">Model</text>
    <text x="1288" y="262" font-size="15" fill="#1c2b25">gpt-5.5</text>
    <text x="1190" y="300" font-size="15" fill="#65736d">Mode</text>
    <text x="1288" y="300" font-size="15" fill="#1c2b25">Agent</text>
    <text x="1190" y="338" font-size="15" fill="#65736d">Approvals</text>
    <text x="1288" y="338" font-size="15" fill="#1c2b25">on request</text>
  </g>
</svg>
